name: Sync collector to HuggingFace Space

on:
  push:
    branches: [main]
    paths:
      - 'collector/**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Upload files to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi

          api   = HfApi()
          token = os.environ["HF_TOKEN"]
          repo  = "voroman/velib-collector"

          files = {
              "collector/ingestion_hf.py":           "ingestion_hf.py",
              "collector/collector_app.py":           "collector_app.py",
              "collector/Dockerfile.collector":       "Dockerfile",
              "collector/requirements.collector.txt": "requirements.txt",
          }

          for local_path, remote_path in files.items():
              api.upload_file(
                  path_or_fileobj=local_path,
                  path_in_repo=remote_path,
                  repo_id=repo,
                  repo_type="space",
                  token=token,
              )
              print(f"Uploaded {local_path} → {remote_path}")

          print("Sync terminé ✓")
          EOF