name: Sync collector to HuggingFace Space

on:
  push:
    branches: [main]
    paths:
      - 'collector/**'    # déclenché uniquement si collector/ change

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Préparer un dossier temporaire propre
          mkdir hf_push
          cp collector/ingestion_hf.py        hf_push/
          cp collector/collector_app.py        hf_push/
          cp collector/Dockerfile.collector    hf_push/Dockerfile
          cp collector/requirements.collector.txt hf_push/requirements.txt

          # Initialiser et pusher vers HF
          cd hf_push
          git init
          git config user.email "github-actions@github.com"
          git config user.name  "GitHub Actions"
          git remote add space https://oauth2:$HF_TOKEN@huggingface.co/spaces/voroman/velib-collector
          git add .
          git commit -m "Sync from GitHub — ${{ github.sha }}"
          git push space HEAD:main --force